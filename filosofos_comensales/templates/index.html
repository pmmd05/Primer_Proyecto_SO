<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Filósofos Comensales — SO / URL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="icon" href="/imagenes/pensando.png">
<link href="https://fonts.googleapis.com/css2?family=Pathway+Gothic+One&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
:root {
  --bg:    #1a1c1e;
  --bg1:   #22262b;
  --bg2:   #2b3038;
  --border:#3a424e;
  --bord2: #5a6678;
  --gold:  #b8c8d8;
  --gold2: #dce8f0;
  --amber: #a8c4d8;
  --dim:   #5a6878;
  --txt:   #c8d4dc;
  --blue:  #44aaff;
  --fh: 'Pathway Gothic One', sans-serif;
  --fm: 'JetBrains Mono', monospace;
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--txt);
  font-family: var(--fm);
  font-size: 12px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Header ── */
header {
  position: sticky; top: 0; z-index: 300;
  background: #0e0c0a;
  border-bottom: 1px solid var(--bord2);
  padding: 8px 20px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; flex-wrap: wrap;
}
.logo {
  font-family: var(--fh); font-size: 30px;
  letter-spacing: 3px; color: var(--gold2);
}
.hdr-r { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.ctrl-group { display: flex; align-items: center; gap: 6px; }
.ctrl-lbl { font-family: var(--fh); font-size: 11px; letter-spacing: 2px; color: var(--dim); }
.ctrl-input {
  width: 52px; padding: 4px 6px;
  background: var(--bg2); border: 1px solid var(--bord2);
  color: var(--gold2); font-family: var(--fm);
  font-size: 13px; border-radius: 4px; text-align: center;
}
.ctrl-input:focus { outline: none; border-color: var(--gold); }
.btn-go {
  font-family: var(--fh); font-size: 11px; letter-spacing: 2px;
  padding: 8px 18px; border: 1px solid var(--gold);
  background: rgba(255,255,255,.1); color: var(--gold2);
  border-radius: 5px; cursor: pointer;
}
.btn-go:hover:not(:disabled) { background: rgba(255,255,255,.2); }
.btn-go:disabled { opacity: .35; cursor: default; }

/* ── Layout ── */
.layout { display: flex; flex-direction: column; align-items: center; padding: 16px; }

/* ── Escena ── */
.scene-wrap { position: relative; width: 540px; height: 540px; flex-shrink: 0; }

.table-el {
  position: absolute; top: 50%; left: 50%;
  width: 200px; height: 200px;
  transform: translate(-50%,-50%);
  border-radius: 50%;
  background: radial-gradient(circle at 38% 32%, #3c4e62 0%, #1a2430 100%);
  border: 2px solid #4a5e72;
  box-shadow: 0 6px 24px rgba(0,0,0,.6);
  display: flex; align-items: center; justify-content: center;
}
.table-text {
  font-family: var(--fh); font-size: 30px; letter-spacing: 2px;
  color: #fff; text-align: center; line-height: 1.6;
}

/* ── Filósofo ── */
.phil-seat {
  position: absolute;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  width: 108px;
}
.phil-card {
  background: var(--bg1); border: 1px solid var(--border); border-radius: 10px;
  padding: 8px 6px 6px; width: 100%;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  transition: border-color .25s;
}
.phil-card.g-waiting { border-color: var(--amber); }
.phil-card.g-eating  { border-color: var(--gold2); }
.phil-card.g-done    { border-color: var(--dim); opacity: .6; }

.phil-img {
  width: 58px; height: 58px; object-fit: contain; border-radius: 6px;
  transition: filter .25s;
}
.phil-img.s-thinking { filter: brightness(.8) saturate(.5); }
.phil-img.s-waiting  { filter: brightness(.9) saturate(.7); }
.phil-img.s-eating   { filter: brightness(1.1); }
.phil-img.s-done     { filter: grayscale(1) brightness(.6); }
.phil-img.s-idle     { filter: brightness(.6) saturate(.3); }

.phil-name {
  font-family: var(--fh); font-size: 15px; letter-spacing: 1px;
  color: var(--gold); text-align: center; white-space: nowrap;
}
.phil-state-lbl {
  font-family: var(--fh); font-size: 12px; letter-spacing: 1.5px; height: 12px; text-align: center;
}
.phil-eats { font-size: 11px; color: var(--dim); font-family: var(--fh); }
.phil-eats b { color: var(--gold2); }

/* ── Tenedores ── */
.fork-side {
  position: absolute; width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; pointer-events: none; user-select: none;
  transition: filter .2s;
}
.fork-side.free { filter: brightness(.55); }
.fork-side.held { filter: brightness(1.6) drop-shadow(0 0 6px var(--gold2)); }

/* ── Stats ── */
.stats-bar {
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  max-width: 600px; margin-top: 14px;
}
.stat-chip {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 20px; font-family: var(--fh); font-size: 10px; letter-spacing: 1px;
}
.stat-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); }
.stat-chip.s-thinking .stat-dot { background: var(--blue); }
.stat-chip.s-waiting  .stat-dot { background: var(--amber); }
.stat-chip.s-eating   .stat-dot { background: var(--gold2); }

/* ── Log ── */
.log-sec { width: 100%; max-width: 900px; margin-top: 14px; }
.log-wrap { background: var(--bg1); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.log-hdr {
  padding: 6px 12px; background: var(--bg2); border-bottom: 1px solid var(--border);
  font-family: var(--fh); font-size: 11px; letter-spacing: 2px; color: var(--gold);
  display: flex; align-items: center; justify-content: space-between;
}
.log-clr {
  font-size: 11px; background: none; border: 1px solid var(--border);
  color: var(--dim); border-radius: 3px; padding: 2px 7px;
  cursor: pointer; font-family: var(--fh); letter-spacing: 1px;
}
.log-clr:hover { color: var(--txt); border-color: var(--bord2); }
.log-body {
  height: 150px; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: var(--bord2) transparent;
}
.log-row {
  display: flex; gap: 8px; padding: 3px 12px;
  border-bottom: 1px solid var(--border); font-size: 13px;
}
.log-ts   { color: var(--dim); min-width: 58px; font-size: 12px; flex-shrink: 0; }
.c-system { color: var(--dim); font-style: italic; }

/* ── Overlay final ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(10,7,5,.92);
  z-index: 500; align-items: center; justify-content: center;
}
.overlay.show { display: flex; }
.fin-card {
  background: var(--bg1); border: 1px solid var(--bord2); border-radius: 14px;
  padding: 32px; max-width: 460px; width: 92%; text-align: center;
}
.fin-title {
  font-family: var(--fh); font-size: 17px; letter-spacing: 4px;
  color: var(--gold2); margin-bottom: 20px;
}
.fin-row {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg2); border-radius: 7px; padding: 9px 14px; margin-bottom: 7px;
  font-family: var(--fh); font-size: 12px; letter-spacing: 2px;
}
.fin-val { font-family: var(--fh); font-size: 22px; font-weight: 900; color: var(--gold2); }
.btn-rst {
  font-family: var(--fh); font-size: 10px; letter-spacing: 2px; margin-top: 14px;
  padding: 9px 20px; border: 1px solid var(--bord2); background: var(--bg2);
  color: var(--txt); border-radius: 6px; cursor: pointer;
}
.btn-rst:hover { border-color: var(--gold); color: var(--gold2); }
</style>
</head>
<body>
<div class="page">

<header>
  <div class="logo">FILÓSOFOS COMENSALES &nbsp;/&nbsp; SO — URL</div>
  <div class="hdr-r">
    <div class="ctrl-group">
      <span class="ctrl-lbl">FILÓSOFOS</span>
      <input class="ctrl-input" id="inp-n" type="number" min="2" max="10" value="{{ default_n }}">
    </div>
    <div class="ctrl-group">
      <span class="ctrl-lbl">CICLOS</span>
      <input class="ctrl-input" id="inp-c" type="number" min="1" max="50" value="{{ default_cycles }}">
    </div>
    <button class="btn-go" id="btn-go" onclick="startSim()">▶ INICIAR</button>
  </div>
</header>

<div class="layout">
  <div class="scene-wrap" id="scene">
    <div class="table-el" id="table-el">
      <div class="table-text" id="table-text">MESA<br>CIRCULAR</div>
    </div>
  </div>

  <div class="stats-bar" id="stats-bar"></div>

  <div class="log-sec">
    <div class="log-wrap">
      <div class="log-hdr">
        <span>◉ REGISTRO DE EVENTOS</span>
        <button class="log-clr" onclick="document.getElementById('log-body').innerHTML=''">LIMPIAR</button>
      </div>
      <div class="log-body" id="log-body"></div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="fin-card">
    <div class="fin-title">✦ BANQUETE COMPLETADO ✦</div>
    <div id="fin-rows"></div>
    <button class="btn-rst" onclick="restartUI()">↺ NUEVO BANQUETE</button>
  </div>
</div>

<script id="sim-config" type="application/json">
  {{ {
    "names": names_js,
    "defaultN": default_n,
    "defaultCycles": default_cycles
  } | tojson }}
</script>

<script>
const simConfig   = JSON.parse(document.getElementById('sim-config').textContent);
const ALL_NAMES   = simConfig.names;
const DEFAULT_N   = simConfig.defaultN;
const DEFAULT_CYC = simConfig.defaultCycles;

const PHIL_COLORS = [
  '#7ec8e3','#4fa8d5','#a8d8ea','#5bbfdb','#3a9abf',
  '#8ecae6','#2a8ab0','#b0dff0','#6ab4d4','#44a0c8',
];

const SEAT_W = 108, SEAT_H = 128;

function sceneRadius(n) { return Math.min(Math.max(220, n * 52), 300); }

function buildScene(n, names) {
  const scene     = document.getElementById('scene');
  const tableEl   = document.getElementById('table-el');
  const sceneSize = Math.max(540, n * 110 + 60);
  scene.style.width = scene.style.height = sceneSize + 'px';

  const cx = sceneSize / 2, cy = sceneSize / 2, R = sceneRadius(n);
  document.querySelectorAll('.phil-seat, .fork-side').forEach(el => el.remove());

  const tableSize = Math.max(160, sceneSize * 0.28);
  tableEl.style.width = tableEl.style.height = tableSize + 'px';

  for (let i = 0; i < n; i++) {
    const angle = (2 * Math.PI * i / n) - Math.PI / 2;
    const px = cx + R * Math.cos(angle), py = cy + R * Math.sin(angle);
    const seat = document.createElement('div');
    seat.className = 'phil-seat';
    seat.id = 'seat-' + i;
    seat.style.left = (px - SEAT_W / 2) + 'px';
    seat.style.top  = (py - SEAT_H / 2) + 'px';
    seat.innerHTML = `
      <div class="phil-card g-thinking" id="card-${i}">
        <img class="phil-img s-idle" id="img-${i}" src="/imagenes/pensando.png" alt="${names[i]}">
        <div class="phil-name">${names[i]}</div>
        <div class="phil-state-lbl" id="slbl-${i}" style="color:var(--dim)">IDLE</div>
        <div class="phil-eats" id="eats-${i}">comidas: <b>0</b></div>
      </div>`;
    scene.appendChild(seat);
  }

  const dAngle = (2 * Math.PI) / n;
  const philPos = Array.from({ length: n }, (_, i) => ({
    x: cx + R * Math.cos(dAngle * i - Math.PI / 2),
    y: cy + R * Math.sin(dAngle * i - Math.PI / 2),
  }));

  for (let i = 0; i < n; i++) {
    const pi = philPos[i], pj = philPos[(i - 1 + n) % n];
    let fx = (pi.x + pj.x) / 2, fy = (pi.y + pj.y) / 2;
    if (n === 2) { fx = cx + (i === 0 ? R * 0.55 : -R * 0.55); fy = cy; }

    const rotDeg = Math.atan2(pi.y - pj.y, pi.x - pj.x) * 180 / Math.PI + 90;
    const fork = document.createElement('div');
    fork.className = 'fork-side free';
    fork.id = 'fork-' + i;
    fork.dataset.baseRot = rotDeg;
    fork.title = 'Tenedor ' + i;
    fork.style.left = (fx - 13) + 'px';
    fork.style.top  = (fy - 13) + 'px';
    fork.style.transform = `rotate(${rotDeg}deg)`;
    fork.textContent = '🍴';
    scene.appendChild(fork);
  }

  buildStats(n, names);
}

function buildStats(n, names) {
  const bar = document.getElementById('stats-bar');
  bar.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const chip = document.createElement('div');
    chip.className = 'stat-chip s-idle';
    chip.id = 'chip-' + i;
    chip.innerHTML = `<span class="stat-dot"></span>
      <span style="color:${PHIL_COLORS[i % PHIL_COLORS.length]}">${names[i]}</span>
      <span id="chip-lbl-${i}" style="color:var(--dim)">IDLE</span>`;
    bar.appendChild(chip);
  }
}

const IMG_MAP  = { idle:'./imagenes/pensando.png', thinking:'./imagenes/pensando.png', waiting:'./imagenes/esperando.png', eating:'./imagenes/comiendo.png', done:'./imagenes/pensando.png' };
const LBL_MAP  = { idle:'IDLE', thinking:'PENSANDO', waiting:'ESPERANDO', eating:'COMIENDO', done:'TERMINADO ✓' };
const CARD_CLS = { idle:'g-thinking', thinking:'g-thinking', waiting:'g-waiting', eating:'g-eating', done:'g-done' };
const CHIP_CLS = { idle:'s-thinking', thinking:'s-thinking', waiting:'s-waiting', eating:'s-eating', done:'s-done' };

function updatePhilosopher(i, state, count) {
  const imgEl  = document.getElementById('img-'  + i);
  const cardEl = document.getElementById('card-' + i);
  const lblEl  = document.getElementById('slbl-' + i);
  const eatsEl = document.getElementById('eats-' + i);
  const chipEl = document.getElementById('chip-' + i);
  const cLblEl = document.getElementById('chip-lbl-' + i);
  if (!imgEl) return;

  imgEl.src        = IMG_MAP[state] || IMG_MAP.idle;
  imgEl.className  = 'phil-img s-' + state;
  cardEl.className = 'phil-card ' + (CARD_CLS[state] || 'g-thinking');

  const color = state==='eating' ? 'var(--gold2)' : state==='waiting' ? 'var(--amber)' : state==='done' ? 'var(--dim)' : PHIL_COLORS[i % PHIL_COLORS.length];
  lblEl.textContent = LBL_MAP[state] || state.toUpperCase();
  lblEl.style.color = color;

  if (eatsEl) eatsEl.innerHTML = `comidas: <b>${count}</b>`;
  if (chipEl) chipEl.className = 'stat-chip ' + (CHIP_CLS[state] || 's-thinking');
  if (cLblEl) { cLblEl.textContent = LBL_MAP[state] || state; cLblEl.style.color = color; }
}

function updateForks(forkHeld) {
  if (!forkHeld) return;
  for (let i = 0; i < forkHeld.length; i++) {
    const el = document.getElementById('fork-' + i);
    if (!el) continue;
    const baseRot = parseFloat(el.dataset.baseRot) || 0;
    el.className = 'fork-side ' + (forkHeld[i] ? 'held' : 'free');
    el.style.transform = `rotate(${baseRot}deg)${forkHeld[i] ? ' scale(1.3)' : ''}`;
    el.style.filter = forkHeld[i]
      ? 'brightness(1.5) drop-shadow(0 0 9px var(--gold2))'
      : 'brightness(.55)';
  }
}

function applySnapshot(data) {
  if (!data) return;
  const n = data.n || DEFAULT_N;
  if (data.states) for (let i = 0; i < n; i++) updatePhilosopher(i, data.states[i]||'idle', data.counts?.[i]||0);
  updateForks(data.fork_held);
}

function addLog(msg, kind, ts) {
  const body = document.getElementById('log-body');
  const row  = document.createElement('div');
  row.className = 'log-row';
  const philIdx = parseInt(kind);
  const color   = isNaN(philIdx) ? '' : PHIL_COLORS[philIdx % PHIL_COLORS.length];
  const cls     = isNaN(philIdx) ? 'c-system' : '';
  row.innerHTML = `<span class="log-ts">${ts}</span><span class="${cls}" style="color:${color}">${msg}</span>`;
  body.insertBefore(row, body.firstChild);
  if (body.children.length > 200) body.removeChild(body.lastChild);
}

const socket = io();
let N = DEFAULT_N;

socket.on('connect', () => {
  addLog('Conectado al servidor', 'system', new Date().toLocaleTimeString());
  buildScene(DEFAULT_N, ALL_NAMES.slice(0, DEFAULT_N));
});
socket.on('ready', data => { if (data.n) buildScene(data.n, data.names || ALL_NAMES.slice(0, data.n)); });
socket.on('simulation_start', data => {
  N = data.n;
  buildScene(N, data.names || ALL_NAMES.slice(0, N));
  applySnapshot(data);
  document.getElementById('btn-go').disabled = true;
  document.getElementById('btn-go').textContent = '⟳ EN CURSO';
  document.getElementById('inp-n').disabled = true;
  document.getElementById('inp-c').disabled = true;
  document.getElementById('table-text').innerHTML = `${N} FILÓSOFOS<br>${data.cycles} CICLOS`;
});
socket.on('state_update',  data => applySnapshot(data));
socket.on('fork_attempt',  data => applySnapshot(data));
socket.on('fork_taken',    data => { applySnapshot(data); updateForks(data.fork_held); });
socket.on('eating_start',  data => applySnapshot(data));
socket.on('eating_end',    data => applySnapshot(data));
socket.on('log',           data => addLog(data.msg, data.kind, data.ts));

socket.on('simulation_end', data => {
  document.getElementById('btn-go').textContent = '✓ COMPLETADO';
  const rows  = document.getElementById('fin-rows');
  rows.innerHTML = '';
  const names = data.names || ALL_NAMES.slice(0, data.counts.length);
  data.counts.forEach((c, i) => {
    const bar = '█'.repeat(Math.round(c / data.cycles * 10)) + '░'.repeat(10 - Math.round(c / data.cycles * 10));
    const row = document.createElement('div');
    row.className = 'fin-row';
    row.innerHTML = `
      <span style="color:${PHIL_COLORS[i % PHIL_COLORS.length]};min-width:80px">${names[i]}</span>
      <span style="font-size:8px;color:var(--gold);font-family:var(--fm);flex:1;text-align:center">${bar}</span>
      <span class="fin-val">${c}</span>`;
    rows.appendChild(row);
  });
  setTimeout(() => document.getElementById('overlay').classList.add('show'), 1600);
});

function startSim() {
  const n = Math.max(2, Math.min(10, parseInt(document.getElementById('inp-n').value) || DEFAULT_N));
  const c = Math.max(1, Math.min(50, parseInt(document.getElementById('inp-c').value) || DEFAULT_CYC));
  socket.emit('start', { n, cycles: c });
}

function restartUI() {
  document.getElementById('overlay').classList.remove('show');
  const btn = document.getElementById('btn-go');
  btn.disabled = false; btn.textContent = '▶ INICIAR';
  document.getElementById('inp-n').disabled = false;
  document.getElementById('inp-c').disabled = false;
  document.getElementById('log-body').innerHTML = '';
  buildScene(parseInt(document.getElementById('inp-n').value) || DEFAULT_N, ALL_NAMES.slice(0, DEFAULT_N));
  document.getElementById('table-text').innerHTML = 'MESA<br>CIRCULAR';
}

document.getElementById('inp-n').addEventListener('change', () => {
  const n = Math.max(2, Math.min(10, parseInt(document.getElementById('inp-n').value) || DEFAULT_N));
  buildScene(n, ALL_NAMES.slice(0, n));
});
</script>
</body>
</html>
